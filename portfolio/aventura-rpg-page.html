<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aventura RPG - Web</title>
  <link rel="stylesheet" href="aventura-rpg-card.css">
</head>
<body>
  <main class="wrap">
    <section class="card top">
      <div>
        <h1 class="title">Aventura RPG - Web</h1>
        <p class="status" id="statusLine"></p>
      </div>
      <div class="row">
        <button class="ghost" id="btnNew">Novo Jogo</button>
        <button class="ghost" id="btnLoad">Carregar</button>
        <button class="ghost" id="btnSave">Salvar</button>
      </div>
    </section>

    <section class="card">
      <div id="battleCard" class="panel">
        <div class="line battle">
          <div>
            <strong id="enemyName">Inimigo</strong>
            <div class="muted" id="enemyStats"></div>
          </div>
          <div style="min-width: 220px; width: 40%">
            <div class="bar"><div id="enemyHpFill" class="fill"></div></div>
          </div>
        </div>
      </div>
      <div id="log" class="log"></div>
    </section>

    <section class="card">
      <div class="row" id="hubActions">
        <button id="btnExplore">Explorar</button>
        <button id="btnSolar">Acao Solar</button>
        <button class="alt" id="btnShop">Loja</button>
        <button class="alt" id="btnInv">Inventario</button>
      </div>

      <div class="row" id="battleActions" style="display:none">
        <button id="btnAttack">Atacar</button>
        <button class="alt" id="btnBattlePotion">Usar Pocao</button>
        <button id="btnBattleSolar">Acao Solar</button>
        <button id="btnFlee" class="danger">Fugir</button>
      </div>
    </section>

    <section class="card panel" id="shopPanel">
      <h3>Loja</h3>
      <div class="list" id="shopList"></div>
      <button class="ghost" id="btnCloseShop">Fechar Loja</button>
    </section>

    <section class="card panel" id="invPanel">
      <h3>Inventario</h3>
      <div class="list" id="invList"></div>
      <button class="ghost" id="btnCloseInv">Fechar Inventario</button>
    </section>
  </main>

  <script src="aventura-rpg-script.js"></script>
</body>
</html>
